name: Build & Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Version Change
        id: check_version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Compare current version to previous commit version
            PREV_VERSION=$(git show HEAD~1:app/build.gradle.kts 2>/dev/null | grep -E "versionName\s*=" | grep -o '"[^"]*"' | tr -d '"' || echo "")
            CURR_VERSION=$(grep -E "versionName\s*=" app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"' || echo "")
            echo "Previous version: '$PREV_VERSION'"
            echo "Current version: '$CURR_VERSION'"
            if [ -n "$CURR_VERSION" ] && [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
              echo "version_name=v$CURR_VERSION" >> $GITHUB_OUTPUT
            else
              echo "version_changed=false" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "version_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      # Make sure the wrapper/gradlew executable exists dynamically
      - name: Generate Wrapper Executables
        run: gradle wrapper

      - name: Build APKs
        run: |
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Create GitHub Release
        if: steps.check_version.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_version.outputs.version_name }}
          name: Release ${{ steps.check_version.outputs.version_name }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
