name: Build & Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Detect Version Change
        id: check_version
        run: |
          # Compare current version to previous commit version
          PREV_VERSION=$(git show HEAD~1:app/build.gradle.kts 2>/dev/null | grep -E "versionName\s*=" | grep -o '"[^"]*"' | tr -d '"' || echo "")
          CURR_VERSION=$(grep -E "versionName\s*=" app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"' || echo "")
          echo "Previous version: '$PREV_VERSION'"
          echo "Current version: '$CURR_VERSION'"
          if [ -n "$CURR_VERSION" ] && [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "version_name=v$CURR_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      # Make sure the wrapper/gradlew executable exists dynamically
      - name: Generate Wrapper Executables
        run: gradle wrapper

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret is not set!"
          fi

      - name: Build APKs
        run: |
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Sign Release APK
        run: |
          # Find latest apksigner in Android SDK
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          echo "Using apksigner at: $APKSIGNER"
          
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "Using custom signing key from secrets..."
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.keystore
            ALIAS="${{ secrets.ALIAS }}"
            STORE_PASS="${{ secrets.KEY_STORE_PASSWORD }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            echo "No signing key secret found. Using repository test-release.jks key..."
            cp test-release.jks release.keystore
            ALIAS="flixora-key"
            STORE_PASS="flixorapass"
            KEY_PASS="flixorapass"
          fi
          
          $APKSIGNER sign --ks release.keystore --ks-key-alias "$ALIAS" --ks-pass pass:"$STORE_PASS" --key-pass pass:"$KEY_PASS" --out app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.7
          name: Release v0.1.7
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
